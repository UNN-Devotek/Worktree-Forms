# =============================================================================
# docker-compose.dokploy.yml — Full dev stack for Dokploy deployment
# Mirrors docker-compose.yml but production-built (no bind mounts, no polling)
# =============================================================================

services:

  # ─── Application Services ──────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://worktree.pro}
        NEXT_PUBLIC_ENABLE_DEV_LOGIN: ${NEXT_PUBLIC_ENABLE_DEV_LOGIN:-true}
    image: worktree-runner:local
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3005}
      BACKEND_PORT: ${BACKEND_PORT:-5005}
      HOSTNAME: "0.0.0.0"
      ENABLE_DEV_LOGIN: ${ENABLE_DEV_LOGIN:-true}
      NEXT_PUBLIC_ENABLE_DEV_LOGIN: ${NEXT_PUBLIC_ENABLE_DEV_LOGIN:-true}
      # CORS & URLs
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://worktree.pro}
      FRONTEND_URL: ${FRONTEND_URL:-https://worktree.pro}
      # Auth
      AUTH_SECRET: ${AUTH_SECRET:-change-me-32-chars-minimum-secret}
      JWT_SECRET: ${JWT_SECRET:-worktree-jwt-dev-secret-change-in-prod}
      JWT_EXPIRE: ${JWT_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      AUTH_URL: ${AUTH_URL:-https://worktree.pro}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://worktree.pro}
      # DynamoDB Local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      DYNAMODB_AUTH_TABLE_NAME: ${DYNAMODB_AUTH_TABLE_NAME:-worktree-auth-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      # Redis
      REDIS_URL: redis://redis:6379
      # S3 — LocalStack
      S3_ENDPOINT: http://localstack:4510
      S3_BUCKET: ${S3_BUCKET:-worktree-local}
      # Pinecone
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-worktree-local}
      # Frontend
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://worktree.pro}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://worktree.pro/ws}
    ports:
      - "${PORT:-3005}:${PORT:-3005}"
      - "${BACKEND_PORT:-5005}:${BACKEND_PORT:-5005}"
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.worktree.rule=Host(`worktree.pro`)"
      - "traefik.http.routers.worktree.entrypoints=websecure"
      - "traefik.http.routers.worktree.tls=true"
      - "traefik.http.routers.worktree.tls.certresolver=letsencrypt"
      - "traefik.http.services.worktree.loadbalancer.server.port=3005"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.worktree-http.rule=Host(`worktree.pro`)"
      - "traefik.http.routers.worktree-http.entrypoints=web"
      - "traefik.http.routers.worktree-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - dokploy-network
      - default
    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '3'
        reservations:
          memory: 1G
          cpus: '1'

  ws-server:
    image: worktree-runner:local
    restart: unless-stopped
    command: ["node", "/app/apps/backend/dist/ws-server.js"]
    environment:
      WS_PORT: 1234
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-change-me-32-chars-minimum-secret}
      JWT_SECRET: ${JWT_SECRET:-worktree-jwt-dev-secret-change-in-prod}
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "1234:1234"

    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  worker:
    image: worktree-runner:local
    restart: unless-stopped
    command: ["node", "/app/apps/backend/dist/worker.js"]
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://localstack:4510
      S3_BUCKET: ${S3_BUCKET:-worktree-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AUTH_SECRET: ${AUTH_SECRET:-change-me-32-chars-minimum-secret}
      JWT_SECRET: ${JWT_SECRET:-worktree-jwt-dev-secret-change-in-prod}
      NODE_OPTIONS: "--max-old-space-size=512"

    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # ─── Seed (init container — runs once then exits) ──────────────────────────

  seed:
    image: amazon/aws-cli:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "=== Worktree Seed: Creating tables and data ==="

        ENDPOINT="http://dynamodb-local:8100"
        TABLE="${DYNAMODB_TABLE_NAME:-worktree-local}"
        AUTH_TABLE="${DYNAMODB_AUTH_TABLE_NAME:-worktree-auth-local}"
        S3_EP="http://localstack:4510"
        S3_BUCKET="${S3_BUCKET:-worktree-local}"
        REGION="us-east-1"
        PASS_HASH='$$2a$$10$$aGD4C9rCloTizYYXGzEn8uMrKhvSC8DV4vIqc2upf0gpgRInDGG9e'
        NOW="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        ADMIN_ID="user_admin_dev_00001"
        USER_ID="user_member_dev_00001"
        PROJECT_ID="proj_sample_dev_00001"

        echo "[1] Creating S3 bucket..."
        aws s3 mb "s3://$$S3_BUCKET" --endpoint-url "$$S3_EP" --region "$$REGION" 2>/dev/null || echo "  Bucket exists"

        echo "[2] Creating main DynamoDB table..."
        aws dynamodb create-table \
          --table-name "$$TABLE" \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
          --global-secondary-indexes '[{"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"},"ProvisionedThroughput":{"ReadCapacityUnits":5,"WriteCapacityUnits":5}}]' \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || echo "  Table exists"

        aws dynamodb update-time-to-live \
          --table-name "$$TABLE" \
          --time-to-live-specification "Enabled=true,AttributeName=ttl" \
          --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || true

        echo "[3] Creating auth DynamoDB table..."
        aws dynamodb create-table \
          --table-name "$$AUTH_TABLE" \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --attribute-definitions \
            AttributeName=pk,AttributeType=S \
            AttributeName=sk,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
          --global-secondary-indexes '[{"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"},"ProvisionedThroughput":{"ReadCapacityUnits":5,"WriteCapacityUnits":5}}]' \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || echo "  Auth table exists"

        aws dynamodb update-time-to-live \
          --table-name "$$AUTH_TABLE" \
          --time-to-live-specification "Enabled=true,AttributeName=expires" \
          --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || true

        echo "[4] Seeding dev users (upsert — always writes correct password hash)..."
        aws dynamodb put-item --table-name "$$TABLE" --item "{\"PK\":{\"S\":\"USER#$$ADMIN_ID\"},\"SK\":{\"S\":\"USER\"},\"GSI1PK\":{\"S\":\"admin@worktree.pro\"},\"GSI1SK\":{\"S\":\"USER\"},\"userId\":{\"S\":\"$$ADMIN_ID\"},\"email\":{\"S\":\"admin@worktree.pro\"},\"name\":{\"S\":\"Admin User\"},\"passwordHash\":{\"S\":\"$$PASS_HASH\"},\"role\":{\"S\":\"ADMIN\"},\"theme\":{\"S\":\"system\"},\"locale\":{\"S\":\"en\"},\"createdAt\":{\"S\":\"$$NOW\"},\"updatedAt\":{\"S\":\"$$NOW\"}}" --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || echo "  Admin seed failed"
        aws dynamodb put-item --table-name "$$TABLE" --item "{\"PK\":{\"S\":\"USER#$$USER_ID\"},\"SK\":{\"S\":\"USER\"},\"GSI1PK\":{\"S\":\"user@worktree.com\"},\"GSI1SK\":{\"S\":\"USER\"},\"userId\":{\"S\":\"$$USER_ID\"},\"email\":{\"S\":\"user@worktree.com\"},\"name\":{\"S\":\"Test User\"},\"passwordHash\":{\"S\":\"$$PASS_HASH\"},\"role\":{\"S\":\"USER\"},\"theme\":{\"S\":\"system\"},\"locale\":{\"S\":\"en\"},\"createdAt\":{\"S\":\"$$NOW\"},\"updatedAt\":{\"S\":\"$$NOW\"}}" --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || echo "  User seed failed"

        echo "[5] Seeding sample project..."
        aws dynamodb put-item --table-name "$$TABLE" --item "{\"PK\":{\"S\":\"PROJECT#$$PROJECT_ID\"},\"SK\":{\"S\":\"PROJECT\"},\"GSI1PK\":{\"S\":\"sample-project\"},\"GSI1SK\":{\"S\":\"PROJECT\"},\"projectId\":{\"S\":\"$$PROJECT_ID\"},\"slug\":{\"S\":\"sample-project\"},\"name\":{\"S\":\"Sample Project\"},\"description\":{\"S\":\"Development seed project\"},\"ownerId\":{\"S\":\"$$ADMIN_ID\"},\"storageUsedBytes\":{\"N\":\"0\"},\"storageQuotaBytes\":{\"N\":\"10737418240\"},\"createdAt\":{\"S\":\"$$NOW\"},\"updatedAt\":{\"S\":\"$$NOW\"}}" --condition-expression "attribute_not_exists(PK)" --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || echo "  Project exists"
        aws dynamodb put-item --table-name "$$TABLE" --item "{\"PK\":{\"S\":\"PROJECT#$$PROJECT_ID\"},\"SK\":{\"S\":\"MEMBER#$$ADMIN_ID\"},\"GSI1PK\":{\"S\":\"USER#$$ADMIN_ID\"},\"GSI1SK\":{\"S\":\"PROJECT#$$PROJECT_ID\"},\"projectId\":{\"S\":\"$$PROJECT_ID\"},\"userId\":{\"S\":\"$$ADMIN_ID\"},\"email\":{\"S\":\"admin@worktree.pro\"},\"roles\":{\"L\":[{\"S\":\"OWNER\"}]},\"joinedAt\":{\"S\":\"$$NOW\"}}" --condition-expression "attribute_not_exists(SK)" --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || echo "  Admin member exists"
        aws dynamodb put-item --table-name "$$TABLE" --item "{\"PK\":{\"S\":\"PROJECT#$$PROJECT_ID\"},\"SK\":{\"S\":\"MEMBER#$$USER_ID\"},\"GSI1PK\":{\"S\":\"USER#$$USER_ID\"},\"GSI1SK\":{\"S\":\"PROJECT#$$PROJECT_ID\"},\"projectId\":{\"S\":\"$$PROJECT_ID\"},\"userId\":{\"S\":\"$$USER_ID\"},\"email\":{\"S\":\"user@worktree.com\"},\"roles\":{\"L\":[{\"S\":\"VIEWER\"}]},\"joinedAt\":{\"S\":\"$$NOW\"}}" --condition-expression "attribute_not_exists(SK)" --endpoint-url "$$ENDPOINT" --region "$$REGION" 2>/dev/null || echo "  User member exists"

        aws s3api put-object --bucket "$$S3_BUCKET" --key "projects/$$PROJECT_ID/.keep" --body /dev/null --endpoint-url "$$S3_EP" --region "$$REGION" 2>/dev/null || true

        echo "=== Seed complete ==="
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      DYNAMODB_AUTH_TABLE_NAME: ${DYNAMODB_AUTH_TABLE_NAME:-worktree-auth-local}
      S3_BUCKET: ${S3_BUCKET:-worktree-local}

    depends_on:
      dynamodb-local:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # ─── Data Services ─────────────────────────────────────────────────────────

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    restart: unless-stopped
    user: root
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data -port 8100"
    volumes:
      - dynamodb-data:/data
    ports:
      - "8100:8100"

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8100)); s.close()\" 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 256M

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    restart: unless-stopped
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8100
      PORT: 8101
    ports:
      - "8101:8101"

    depends_on:
      dynamodb-local:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  redis:
    image: redis:7
    restart: unless-stopped
    command: "redis-server --maxmemory-policy noeviction"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

  localstack:
    image: localstack/localstack:latest
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      GATEWAY_LISTEN: "0.0.0.0:4510"
    ports:
      - "4510:4510"
    volumes:
      - localstack-data:/var/lib/localstack

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4510/_localstack/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  dokploy-network:
    external: true

volumes:
  dynamodb-data:
  redis-data:
  localstack-data:

