services:
  # Frontend service - runs Next.js dev server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: worktree-frontend
    restart: unless-stopped
    command: npm run dev -w apps/frontend
    environment:
      NODE_ENV: development
      ENABLE_DEV_LOGIN: "true"
      NEXT_PUBLIC_ENABLE_DEV_LOGIN: "true"
      # File watching for WSL2/Docker
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      # Reduce memory for Next.js
      NODE_OPTIONS: "--max-old-space-size=1536"
      # Frontend Config
      PORT: 3005
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5005}
      NEXT_PUBLIC_WS_URL: ws://localhost:1234
      BACKEND_URL: http://backend:5005
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AUTH_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AUTH_URL: http://localhost:3005
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:3005
      DYNAMODB_AUTH_TABLE_NAME: ${DYNAMODB_AUTH_TABLE_NAME:-worktree-auth-local}
    ports:
      - "3005:3005"
    volumes:
      # Mount source code for hot reload
      - ./apps/frontend:/app/apps/frontend:delegated
      - ./packages:/app/packages:delegated
      - ./.env:/app/.env:ro
      # Exclude node_modules and .next from sync
      - frontend_node_modules:/app/apps/frontend/node_modules
      - frontend_next:/app/apps/frontend/.next
      - root_node_modules:/app/node_modules
    networks:
      - worktree-network
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 512M

  # Backend service - runs Express API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: worktree-backend
    restart: unless-stopped
    command: npm run dev -w apps/backend
    environment:
      NODE_ENV: development
      PORT: 5005
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRE: ${JWT_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      ALLOWED_ORIGINS: http://localhost:3005
      FRONTEND_URL: http://localhost:3005
      # DynamoDB
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      DYNAMODB_AUTH_TABLE_NAME: ${DYNAMODB_AUTH_TABLE_NAME:-worktree-auth-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      # S3 — LocalStack
      S3_ENDPOINT: http://localstack:4510
      S3_BUCKET: ${S3_BUCKET:-worktree-local}
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "5005:5005"
    volumes:
      - ./apps/backend:/app/apps/backend:delegated
      - ./packages:/app/packages:delegated
      - ./.env:/app/.env:ro
      - backend_node_modules:/app/apps/backend/node_modules
      - root_node_modules:/app/node_modules
    networks:
      - worktree-network
    depends_on:
      redis:
        condition: service_started

  # WebSocket server for real-time collaboration
  ws-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: worktree-ws
    restart: unless-stopped
    command: npm run start:ws -w apps/backend
    environment:
      WS_PORT: 1234
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "1234:1234"
    volumes:
      - ./apps/backend:/app/apps/backend:delegated
      - ./packages:/app/packages:delegated
      - backend_node_modules:/app/apps/backend/node_modules
      - root_node_modules:/app/node_modules
    networks:
      - worktree-network
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Redis for caching and pub/sub
  redis:
    image: redis:alpine
    container_name: worktree-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - worktree-network
    deploy:
      resources:
        limits:
          memory: 128M

# Named volumes for node_modules (prevents sync overhead)
volumes:
  redis_data:
  root_node_modules:
  frontend_node_modules:
  frontend_next:
  backend_node_modules:

networks:
  worktree-network:
    driver: bridge
