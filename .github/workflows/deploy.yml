name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ─── Test & Build ────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true  # non-blocking until lint is clean

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  # ─── Deploy (main branch only) ───────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          SHORT_SHA=${GITHUB_SHA::8}
          echo "app_image=${ECR_REGISTRY}/worktree-app:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "ws_image=${ECR_REGISTRY}/worktree-ws:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "app_image_latest=${ECR_REGISTRY}/worktree-app:latest" >> $GITHUB_OUTPUT
          echo "ws_image_latest=${ECR_REGISTRY}/worktree-ws:latest" >> $GITHUB_OUTPUT

      - name: Build and push app image
        run: |
          docker build -t ${{ steps.tags.outputs.app_image }} -t ${{ steps.tags.outputs.app_image_latest }} \
            --target runner \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }} \
            .
          docker push ${{ steps.tags.outputs.app_image }}
          docker push ${{ steps.tags.outputs.app_image_latest }}

      - name: Build and push ws-server image
        run: |
          docker build -t ${{ steps.tags.outputs.ws_image }} -t ${{ steps.tags.outputs.ws_image_latest }} \
            --target runner \
            -f Dockerfile.backend \
            .
          docker push ${{ steps.tags.outputs.ws_image }}
          docker push ${{ steps.tags.outputs.ws_image_latest }}

      - name: Update ECS service — app
        run: |
          aws ecs update-service \
            --cluster worktree-prod \
            --service worktree-app \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS service — ws-server
        run: |
          aws ecs update-service \
            --cluster worktree-prod \
            --service worktree-ws \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS service — worker
        run: |
          aws ecs update-service \
            --cluster worktree-prod \
            --service worktree-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster worktree-prod \
            --services worktree-app worktree-ws worktree-worker \
            --region ${{ env.AWS_REGION }}

      - name: Smoke test
        run: |
          sleep 10
          curl -f https://worktree.pro/api/health || echo "Health check failed — check ECS logs"
