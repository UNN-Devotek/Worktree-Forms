services:

  # ─── Application Services ────────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_ENABLE_DEV_LOGIN: "true"
    container_name: worktree-app
    restart: unless-stopped
    command: /bin/sh -c "npm run dev -w apps/backend & npm run dev -w apps/frontend"
    environment:
      NODE_ENV: development
      ENABLE_DEV_LOGIN: "true"
      NEXT_PUBLIC_ENABLE_DEV_LOGIN: "true"
      NODE_OPTIONS: "--max-old-space-size=4096"
      PORT: ${PORT:-3005}
      BACKEND_PORT: ${BACKEND_PORT:-5005}
      # Auth
      AUTH_SECRET: ${AUTH_SECRET:-change-me-32-chars-minimum-secret}
      AUTH_URL: http://localhost:${PORT:-3005}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:${PORT:-3005}
      # DynamoDB Local (non-default port 8100)
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      # Redis (non-default port 6380)
      REDIS_URL: redis://redis:6380
      # S3 — LocalStack (non-default port 4510)
      S3_ENDPOINT: http://localstack:4510
      S3_BUCKET: ${S3_BUCKET:-worktree-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      # Pinecone
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-worktree-local}
      # Frontend
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ws://localhost:1234
    ports:
      - "${PORT:-3005}:${PORT:-3005}"
      - "${BACKEND_PORT:-5005}:${BACKEND_PORT:-5005}"
    volumes:
      - ./.env.local:/app/.env.local:ro
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
      - frontend_next:/app/apps/frontend/.next
    networks:
      - worktree-network
    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/frontend
          target: /app/apps/frontend
          ignore:
            - node_modules/
            - .next/
        - action: sync
          path: ./apps/backend/src
          target: /app/apps/backend/src
        - action: rebuild
          path: package.json
        - action: rebuild
          path: apps/frontend/package.json
        - action: rebuild
          path: apps/backend/package.json
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4'
        reservations:
          memory: 2G
          cpus: '2'

  ws-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: worktree-ws
    restart: unless-stopped
    command: npm run start:ws -w apps/backend
    environment:
      WS_PORT: 1234
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      REDIS_URL: redis://redis:6380
      AUTH_SECRET: ${AUTH_SECRET:-change-me-32-chars-minimum-secret}
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "1234:1234"
    volumes:
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
      - ./apps/backend/src:/app/apps/backend/src:ro
    networks:
      - worktree-network
    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: worktree-worker
    restart: unless-stopped
    command: npm run start:worker -w apps/backend
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb-local:8100
      DYNAMODB_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-worktree-local}
      REDIS_URL: redis://redis:6380
      S3_ENDPOINT: http://localstack:4510
      S3_BUCKET: ${S3_BUCKET:-worktree-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AUTH_SECRET: ${AUTH_SECRET:-change-me-32-chars-minimum-secret}
      NODE_OPTIONS: "--max-old-space-size=512"
    volumes:
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
      - ./apps/backend/src:/app/apps/backend/src:ro
    networks:
      - worktree-network
    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # ─── Data Services ────────────────────────────────────────────────────────────

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: worktree-dynamodb
    restart: unless-stopped
    # -port 8100: non-default port  -sharedDb: all processes share one SQLite dataset
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data -port 8100"
    ports:
      - "8100:8100"
    volumes:
      - dynamodb-data:/data
    networks:
      - worktree-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8100 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: worktree-dynamodb-admin
    restart: unless-stopped
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8100
      PORT: 8101
    ports:
      - "8101:8101"
    networks:
      - worktree-network
    depends_on:
      dynamodb-local:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  redis:
    image: redis:7
    container_name: worktree-redis
    restart: unless-stopped
    # --port 6380: non-default port  --maxmemory-policy noeviction: required for BullMQ
    command: "redis-server --port 6380 --maxmemory-policy noeviction"
    ports:
      - "6380:6380"
    volumes:
      - redis-data:/data
    networks:
      - worktree-network
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

  localstack:
    image: localstack/localstack:latest
    container_name: worktree-localstack
    restart: unless-stopped
    environment:
      # Only start S3 — keeps startup fast
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      # Non-default port 4510
      GATEWAY_LISTEN: "0.0.0.0:4510"
    ports:
      - "4510:4510"
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - worktree-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4510/_localstack/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Developer Tools (local only) ────────────────────────────────────────────

  pinecone-local:
    image: pinecone-io/pinecone-local:latest
    container_name: worktree-pinecone
    restart: unless-stopped
    profiles:
      - pinecone  # opt-in: docker compose --profile pinecone up
    ports:
      - "5080:5080"
    networks:
      - worktree-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  dynamodb-data:
  redis-data:
  localstack-data:
  root_node_modules:
  frontend_node_modules:
  frontend_next:
  backend_node_modules:

networks:
  worktree-network:
    driver: bridge
